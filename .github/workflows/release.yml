name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.new_version.outputs.version }}
      tag: ${{ steps.new_version.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get latest tag
        id: latest_tag
        run: |
          # Get the latest tag, or use 0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          # Remove 'v' prefix if present
          VERSION=${LATEST_TAG#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest version: $VERSION"

      - name: Calculate new version
        id: new_version
        env:
          CURRENT: ${{ steps.latest_tag.outputs.version }}
          BUMP_TYPE: ${{ github.event.inputs.bump_type }}
        run: |
          IFS='.' read -r -a parts <<< "$CURRENT"
          MAJOR="${parts[0]}"
          MINOR="${parts[1]}"
          PATCH="${parts[2]}"

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Create and push tag
        uses: rickstaa/action-create-tag@a1c7777fcb2fee4f19b0f283ba888afa11678b72 # v1
        with:
          tag: ${{ steps.new_version.outputs.tag }}
          message: "Release ${{ steps.new_version.outputs.tag }}"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.new_version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
          else
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes "" \
              --verify-tag
          fi

          gh release view "$TAG" --json isDraft --jq '.isDraft' | {
            read -r draft
            if [ "$draft" != "true" ]; then
              echo "Expected draft release for ${TAG}, got published release" >&2
              exit 1
            fi
          }

  build-web-assets:
    name: Build Web Assets
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache: true

      - name: Setup mold linker
        uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-web-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Update version in package.json
        working-directory: ui
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json

      - name: Build Web Version for GitHub Pages
        env:
          GITHUB_PAGES: true
        run: mise run build:web

      - name: Upload GitHub Pages artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-dist-pages
          path: ui/dist
          retention-days: 1

      - name: Build Web Version for Docker (no base path)
        run: |
          rm -rf ui/dist
          rm -rf ui/node_modules/.vite
          cd ui && npm run build

      - name: Upload Docker artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-dist-docker
          path: ui/dist
          retention-days: 1

  build-cli:
    name: Build CLI
    needs: prepare-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          persist-credentials: false

      - name: Setup mold linker
        uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache: true

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-cli-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust target
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Update version in Cargo.toml
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build CLI
        run: cargo build --release --target x86_64-unknown-linux-gnu -p rustatio-cli

      - name: Upload CLI binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release upload "$TAG" target/x86_64-unknown-linux-gnu/release/rustatio --clobber

  build-docker:
    name: Build Docker Image (${{ matrix.platform }})
    needs: [prepare-release, build-web-assets]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          persist-credentials: false

      - name: Download web dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: web-dist-docker
          path: ./ui/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract platform short name
        id: platform
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "short=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare-release.outputs.version }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digests-${{ steps.platform.outputs.short }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-docker:
    name: Merge Docker Manifests
    needs: [prepare-release, build-docker]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare-release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare-release.outputs.version }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        shell: bash
        run: |
          tags=()
          while read -r tag; do
            tags+=("-t" "$tag")
          done < <(jq -cr '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          shopt -s nullglob
          digest_files=(./*)
          if [ ${#digest_files[@]} -eq 0 ]; then
            echo "No digest files found in /tmp/digests" >&2
            exit 1
          fi

          digests=()
          for file in "${digest_files[@]}"; do
            digests+=("ghcr.io/${{ github.repository }}@sha256:${file##*/}")
          done

          docker buildx imagetools create "${tags[@]}" "${digests[@]}"

      - name: Inspect image
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          docker buildx imagetools inspect "ghcr.io/${{ github.repository }}:${VERSION}"

  build-tauri:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            name: "macOS-x64"
            arch: "x86_64"
            os_name: "macOS"

          # Linux builds
          - platform: "ubuntu-24.04"
            args: "--target x86_64-unknown-linux-gnu"
            name: "Linux-amd64"
            arch: "amd64"
            os_name: "Linux"

          # Windows builds
          - platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc"
            name: "Windows-amd64"
            arch: "amd64"
            os_name: "Windows"

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    environment: release-signing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          persist-credentials: false

      - name: Extract target from args
        id: target
        shell: bash
        env:
          ARGS: ${{ matrix.args }}
        run: |
          if [[ "$ARGS" == *"--target"* ]]; then
            TARGET="${ARGS##*--target }"
            TARGET="${TARGET%% *}"
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          else
            echo "target=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            clang

      - name: Setup mold linker (Ubuntu)
        if: matrix.platform == 'ubuntu-24.04'
        uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache: true

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Build UI for Desktop (without GitHub Pages base path)
        run: mise run build:web

      - name: Update version in Cargo.toml
        shell: bash
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" rustatio-desktop/Cargo.toml
          rm rustatio-desktop/Cargo.toml.bak || true

      - name: Update version in tauri.conf.json
        shell: bash
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" rustatio-desktop/tauri.conf.json
          else
            sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" rustatio-desktop/tauri.conf.json
          fi

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust target
        if: steps.target.outputs.target != ''
        shell: bash
        env:
          TARGET: ${{ steps.target.outputs.target }}
        run: rustup target add "$TARGET"

      - name: Update version in package.json
        working-directory: ui
        shell: bash
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          else
            sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          fi

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: rustatio-desktop
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: ${{ needs.prepare-release.outputs.tag }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonKeepUniversal: false

  prepare-pages:
    name: Prepare GitHub Pages
    needs: [prepare-release, build-web-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download web dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: web-dist-pages
          path: ./ui/dist

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: './ui/dist'

  publish-release:
    name: Publish Release
    needs: [prepare-release, build-tauri, build-cli, merge-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" > "$RUNNER_TEMP/release-notes.json"
          jq -r .body "$RUNNER_TEMP/release-notes.json" > "$RUNNER_TEMP/release-notes.md"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release edit "$TAG" \
            --draft=false \
            --latest \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --title "$TAG"

      - name: Release published
        env:
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          echo "Release ${TAG} has been published!"
          echo "Binaries are now available on GitHub Releases"

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: [prepare-release, prepare-pages]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Pages deployed
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          echo "Web version deployed to GitHub Pages!"
          echo "URL: ${PAGE_URL}"
