# mise configuration for Rustatio
# https://mise.jdx.dev/

[settings]
lockfile = true
jobs = 1  # Run tasks synchronously (one at a time)

[tools]


# Rust toolchain with components
rust = { version = "latest", components = "rustfmt,clippy" }

# WASM tools
"github:WebAssembly/binaryen" = "latest"

# Git hooks manager + config language
hk = "latest"
pkl = "latest"

# Linters for infrastructure files
actionlint = "latest"
shellcheck = "latest"
hadolint = "latest"
typos = "latest"
zizmor = "latest"

[env]
CARGO_TERM_COLOR = "always"
RUST_BACKTRACE = "1"

[tasks.install-tools]
description = "Install mise tools (Rust + Node)"
run = [
    "echo '📦 Installing mise tools (Rust + Node)...'",
    "mise install",
    "echo '✅ Tools installed!'"
]

[tasks.rust-install]
description = "Install Rust dependencies"
depends = ["install-tools"]
run = [
    "echo '📦 Installing Rust dependencies...'",
    "cargo fetch",
    "echo '✅ Rust dependencies installed!'"
]

[tasks.install]
description = "Install all dependencies (tools + packages)"
depends = ["rust-install", "ui:install"]
run = "echo '✅ All dependencies installed!'"

[tasks."build:desktop"]
description = "Build desktop app for production"
depends = ["build:web"]
run = [
    "echo '🏗️  Building Tauri desktop app...'",
    "cd rustatio-desktop && cargo tauri build",
    "echo '✅ Desktop build complete!'"
]

[tasks."build:wasm"]
description = "Build WASM for web version"
depends = ["install-wasm-pack"]
dir = "rustatio-wasm"
run = [
    "echo '🏗️  Building WASM...'",
    "wasm-pack build --target web --out-dir ../ui/src/lib/wasm --release",
    "echo '🗜️  Optimizing WASM...'",
    "wasm-opt -Oz -o ../ui/src/lib/wasm/rustatio_wasm_bg.wasm ../ui/src/lib/wasm/rustatio_wasm_bg.wasm",
    "echo '✅ WASM optimized with wasm-opt'",
    "echo '✅ WASM build complete!'"
]

[tasks."build:web"]
description = "Build complete web version (WASM + UI)"
depends = ["ui:build"]
run = "echo '✅ Web version build complete! Output in ui/dist/'"

[tasks."run:web"]
description = "Run web version in development mode"
depends = ["build:web"]
run = [
    "echo '🏗️  Building WASM in dev mode...'",
    "cd rustatio-wasm && wasm-pack build --target web --out-dir ../ui/src/lib/wasm --dev",
    "echo '🚀 Starting web dev server...'",
    "cd ui && npm run dev"
]

[tasks."run:desktop"]
description = "Run the desktop application in dev mode"
depends = ["build:web"]
run = [
    "echo '🚀 Running Tauri desktop app in dev mode...'",
    "cd rustatio-desktop && cargo tauri dev"
]

[tasks.test]
description = "Run all tests"
run = [
    "echo '🧪 Running Rust tests...'",
    "cargo test",
    "echo '✅ All tests passed!'"
]

[tasks.clean]
description = "Clean build artifacts"
run = [
    "echo '🧹 Cleaning Rust build artifacts...'",
    "cargo clean",
    "echo '🧹 Cleaning UI build artifacts...'",
    "rm -rf ui/dist ui/node_modules/.vite",
    "echo '✅ Clean complete!'"
]

[tasks.clean-all]
description = "Clean all build artifacts and dependencies"
run = [
    "echo '🧹 Cleaning all artifacts and dependencies...'",
    "cargo clean",
    "rm -rf ui/dist ui/node_modules",
    "echo '✅ Deep clean complete!'"
]

[tasks.update]
description = "Update all dependencies"
run = [
    "echo '📦 Updating Rust dependencies...'",
    "cargo update",
    "echo '📦 Updating UI dependencies...'",
    "cd ui && npm update",
    "echo '✅ Dependencies updated!'"
]

[tasks.audit]
description = "Audit dependencies for security vulnerabilities"
run = [
    "echo '🔒 Auditing Rust dependencies...'",
    "cargo audit || echo 'Install cargo-audit: cargo install cargo-audit'",
    "echo '🔒 Auditing UI dependencies...'",
    "cd ui && npm audit",
    "echo '✅ Audit complete!'"
]

[tasks.install-wasm-pack]
description = "Install wasm-pack if not already installed"
run = "cargo install wasm-pack || true"

[tasks."ci:install"]
description = "Install dependencies"
depends = ["rust-install"]
run = [
    "echo '📦 Installing UI dependencies...'",
    "cd ui && npm ci",
    "echo '✅ UI dependencies installed!'"
]

[tasks."ci:lint"]
description = "Run non-Rust lint and format checks via hk"
depends = ["ci:install"]
run = [
    "echo '🔍 Running lint checks (non-Rust)...'",
    "hk check --all --skip-step cargo-clippy",
    "echo '✅ Lint checks passed!'"
]

[tasks."ci:rust"]
description = "Run Rust clippy and tests"
depends = ["ci:install"]
run = [
    "echo '🔍 Running cargo clippy...'",
    "hk check --all --step cargo-clippy",
    "echo '🧪 Running Rust tests...'",
    "cargo test -p rustatio-core -p rustatio-cli",
    "echo '✅ Rust checks passed!'"
]

[tasks.ci]
description = "Run all CI checks (lint + rust)"
depends = ["ci:lint", "ci:rust"]
run = "echo '✅ All CI checks passed!'"

# UI tasks
[tasks."ui:install"]
description = "Install UI dependencies"
run = "cd ui && npm ci"

[tasks."ui:build"]
description = "Build UI for production"
depends = ["ui:install", "build:wasm"]
run = "cd ui && npm run build"

# CLI tasks
[tasks."build:cli"]
description = "Build CLI for release"
run = [
    "echo '🏗️  Building CLI...'",
    "cargo build --release -p rustatio-cli",
    "echo '✅ CLI build complete! Binary at target/release/rustatio'"
]

[tasks."run:cli"]
description = "Run CLI (pass arguments after --)"
run = "cargo run -p rustatio-cli --"

# Server tasks
[tasks."build:server"]
description = "Build server for release"
depends = ["build:web"]
run = [
    "echo '🏗️  Building server...'",
    "cargo build --release -p rustatio-server",
    "echo '✅ Server build complete! Binary at target/release/rustatio-server'"
]

[tasks."run:server"]
description = "Run server in development mode"
depends = ["build:web"]
run = [
    "echo '🚀 Running server...'",
    "cargo run -p rustatio-server"
]

# Docker tasks
[tasks."docker:build"]
description = "Build Docker image locally"
depends = ["build:web"]
run = [
    "echo '🐳 Building Docker image...'",
    "docker build -t rustatio:local .",
    "echo '✅ Docker image built as rustatio:local'"
]

[tasks."docker:run"]
description = "Run Docker container locally"
depends = ["docker:stop"]
run = [
    "echo '🐳 Running Docker container...'",
    "docker run -d -p 8080:8080 --name rustatio rustatio:local",
    "echo '✅ Container started at http://localhost:8080'"
]

[tasks."docker:stop"]
description = "Stop and remove Docker container"
run = [
    "docker stop rustatio || true",
    "docker rm rustatio || true",
    "echo '✅ Container stopped and removed'"
]

[tasks.rust-doc]
description = "Generate Rust documentation"
run = "cargo doc --open --no-deps"

# Version management
[tasks.version]
description = "Show current version"
run = "grep '^version' Cargo.toml | head -1"

[tasks.fix]
description = "Auto-fix lint and formatting issues"
run = "hk fix --all"

# Convenience aliases
[tasks.b]
alias = "build"

[tasks.t]
alias = "test"
